name: Run Benchmarks

on:
  issue_comment

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  benchmark:
    if:
      ${{
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/benchmark') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Acknowledge with reaction
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

      - name: Get PR SHAs
        id: pr_shas
        uses: actions/github-script@v8
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('feature_sha', pr.data.head.sha);
            core.setOutput('baseline_sha', pr.data.base.sha);
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      
      - name: Setup Effekt development environment
        uses: ./.github/actions/setup-effekt
        with:
          install-dependencies: 'true'

      - name: Install Hyperfine
        run: |
          sudo apt install -y hyperfine

      - name: Run benchmarks
        id: bench
        env:
          FEATURE_SHA: ${{ steps.pr_shas.outputs.feature_sha }}
          BASELINE_SHA: ${{ steps.pr_shas.outputs.baseline_sha }}
          CONFIG_FILE: examples/benchmarks/config_js.txt
        run: bash .github/scripts/benchmark.sh

      - name: Aggregate results
        run: |
          git checkout main
          pip3 install scipy
          python3 .github/scripts/aggregate.py results/ results/summary.md

      - name: Write job summary
        if: ${{ always() }}
        env:
          FEATURE_SHA: ${{ steps.pr_shas.outputs.feature_sha }}
          BASELINE_SHA: ${{ steps.pr_shas.outputs.baseline_sha }}
        run: |
          echo "## Benchmark Results: ${FEATURE_SHA} vs ${BASELINE_SHA} (baseline)" >> $GITHUB_STEP_SUMMARY
          if [ -f results/summary.md ]; then
            cat results/summary.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f results/benchmark.log ]; then
            echo "<details><summary>Full log</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat results/benchmark.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment results
        uses: actions/github-script@v8
        if: ${{ always() }}
        env:
          FEATURE_SHA: ${{ steps.pr_shas.outputs.feature_sha }}
          BASELINE_SHA: ${{ steps.pr_shas.outputs.baseline_sha }}
        with:
          script: |
            const fs = require('fs');
            const featureSha = process.env.FEATURE_SHA;
            const baselineSha = process.env.BASELINE_SHA;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            let body = `## Benchmark Results: ${featureSha} vs ${baselineSha} (baseline)\n`;
            try {
              const summary = fs.readFileSync('results/summary.md', 'utf8');
              body += summary + '\n';
            } catch (e) {
              body += `❌ Benchmark failed or produced no output.`;
            }
            body += `\n📋 [Full log in job summary](${runUrl})`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
